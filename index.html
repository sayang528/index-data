<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的数据主页</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        h1 { color: #333; }
        pre { background-color: #f5f5f5; padding: 15px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>我的 JSON 数据展示</h1>
    <p>正在加载数据...</p>
    <pre id="data-container"></pre>
 
    <script>
        // 读取 data.json 文件
        fetch('data.json')
            .then(response => {
                if (!response.ok) throw new Error('数据文件加载失败！');
                return response.json();
            })
            .then(data => {
                // 将数据格式化后展示
                document.getElementById('data-container').textContent = JSON.stringify(data, null, 2);
                document.querySelector('p').style.display = 'none'; // 隐藏加载提示
            })
            .catch(error => {
                document.getElementById('data-container').textContent = error.message;
            });
    </script>
</body>
</html>
