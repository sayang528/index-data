name: 每日更新指数数据
 
# 修复1：支持main和gh-pages双分支触发，手动触发、定时触发
on:
  push:
    branches: [ main, gh-pages ]
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'  # 北京时间每天凌晨4点自动执行
 
jobs:
  update_data:
    runs-on: ubuntu-latest
    # 修复2：给足写入权限，彻底解决权限不足
    permissions:
      contents: write
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          ref: main  # 固定操作main分支，避免gh-pages冲突
 
      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
 
      - name: 执行数据更新脚本
        run: python update_data.py
 
      - name: 提交并推送更新
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # 修复3：无数据变更时不报错，直接跳过
          git diff --cached --exit-code && echo "无数据变更，无需提交" || (git commit -m "自动更新指数估值数据" && git push)
 
