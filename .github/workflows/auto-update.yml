name: 每日更新指数数据
 
# 触发条件：代码推送、手动触发、每天定时执行
on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 20 * * *'  # UTC时间20:00 = 北京时间次日04:00，每天自动跑一次
 
jobs:
  update_data:
    runs-on: ubuntu-latest
    # 🔴 关键修复：给脚本写入仓库的权限，之前没加导致所有提交失败
    permissions:
      contents: write
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4
 
      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
 
      - name: 执行数据更新脚本
        run: python update_data.py
 
      - name: 提交并推送更新
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # 🔴 关键修复：无数据变更时不报错，直接跳过
          git commit -m "自动更新指数估值数据" || echo "无数据变更，无需提交"
          git push
